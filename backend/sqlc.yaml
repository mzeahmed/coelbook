version: "2"
sql:
  - engine: "postgresql"
    queries:
      - "./internal/database/sqlc"
    schema: "./internal/database/migrations"
    gen:
      go:
        package: "repo"
        out: "./internal/database/queries"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true # generate Querier interface